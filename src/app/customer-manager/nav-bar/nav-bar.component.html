<!-- Desktop Navbar (unchanged look) -->
<nav class="navbar">
  <div class="container">
    <div class="logo">Perfect</div>

    <div class="menu desktop-menu">
      <a routerLink="/customer-manager">Customers</a>
      <a routerLink="/customer-manager/order">Order</a>
      <a routerLink="/customer-manager/measurement">Measurement</a>
      <a routerLink="/customer-manager/daily-order">DailyOrder</a>
      <a routerLink="/customer-manager/daily-work">DailyWork</a>
      <a (click)="logout()" class="logout-link">Logout</a>
    </div>
  </div>
</nav>

<!-- Mobile Top Bar -->
<div class="mobile-topbar">
  <span class="mobile-logo">Perfect</span>
  <button (click)="logout()" class="mobile-logout-btn">
    <i class="bi bi-box-arrow-right"></i> Logout
  </button>
</div>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav">
  <a routerLink="/customer-manager" routerLinkActive="active-tab" [routerLinkActiveOptions]="{exact:true}" class="bottom-tab">
    <i class="bi bi-people-fill"></i>
    <span>Customers</span>
  </a>
  <a routerLink="/customer-manager/order" routerLinkActive="active-tab" class="bottom-tab">
    <i class="bi bi-bag-fill"></i>
    <span>Orders</span>
  </a>
  <a routerLink="/customer-manager/measurement" routerLinkActive="active-tab" class="bottom-tab">
    <i class="bi bi-rulers"></i>
    <span>Measure</span>
  </a>
  <a routerLink="/customer-manager/daily-order" routerLinkActive="active-tab" class="bottom-tab">
    <i class="bi bi-clipboard2-check-fill"></i>
    <span>Daily</span>
  </a>
  <a routerLink="/customer-manager/daily-work" routerLinkActive="active-tab" class="bottom-tab">
    <i class="bi bi-calendar2-week-fill"></i>
    <span>Work</span>
  </a>
</nav>
